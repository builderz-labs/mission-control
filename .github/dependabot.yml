# Dependabot config — Mission Control
# Supply-chain hardening: a 7-day cooldown so newly published versions are not
# proposed until the ecosystem has had time to detect and yank a compromised
# release. Pairs with package.json#pnpm.minimumReleaseAge (same 7-day window),
# which blocks installation of too-new versions at resolve time.
version: 2
updates:
  - package-ecosystem: "npm" # also covers pnpm-lock.yaml
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    groups:
      # Minor + patch only. Majors (Tailwind 4, TS 6, vitest 4, ...) each
      # need a deliberate migration and must arrive as individual PRs, not
      # buried in a 27-package group (see #743, which failed CI this way).
      js-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    groups:
      gh-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    ignore:
      # Track the active LTS line; the newest majors skip LTS and carry
      # native-module ABI risk for better-sqlite3/node-pty (see #749).
      - dependency-name: "node"
        versions: [">=25"]
