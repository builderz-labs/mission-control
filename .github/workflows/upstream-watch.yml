# MC Phase 1 — upstream commit watch (T9)
# Source: T9 (eng-review JSONL) + D19 — MC upstream is alpha; fork debt accumulates without policy.
#
# Runs weekly Mondays 14:00 UTC; opens issue if upstream has unpulled commits.

name: upstream-watch

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch-upstream:
    name: Check builderz-labs/mission-control for new commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fetch full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/builderz-labs/mission-control.git
          git fetch upstream main --depth=50

      - name: Compute drift
        id: drift
        run: |
          BEHIND=$(git rev-list --count main..upstream/main)
          AHEAD=$(git rev-list --count upstream/main..main)
          UNPULLED=$(git log main..upstream/main --pretty=format:'- %h %s (%an, %ar)' | head -10)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          {
            echo 'unpulled<<EOF'
            echo "$UNPULLED"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          echo "Summary: behind=$BEHIND, ahead=$AHEAD"

      - name: Open or update issue if drift > 0
        if: steps.drift.outputs.behind != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const behind = '${{ steps.drift.outputs.behind }}';
            const ahead = '${{ steps.drift.outputs.ahead }}';
            const unpulled = `${{ steps.drift.outputs.unpulled }}`;
            const title = `upstream-watch: ${behind} unpulled commits from builderz-labs/main`;
            const body = [
              `Automated weekly upstream-watch run detected drift.`,
              ``,
              `**Drift summary:**`,
              `- This fork is **${behind} commits behind** \`builderz-labs/mission-control@main\``,
              `- This fork is **${ahead} commits ahead** with Lumina-specific patches`,
              ``,
              `**Top 10 unpulled commits:**`,
              unpulled,
              ``,
              `**Action:** schedule a rebase window per \`UPSTREAM.md\` sync procedure.`,
              ``,
              `_Generated by .github/workflows/upstream-watch.yml on ${new Date().toISOString()}_`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-watch',
              state: 'open',
              per_page: 5,
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                title,
                body,
              });
              core.notice(`Updated issue #${existing[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-watch', 'fork-maintenance'],
              });
              core.notice(`Opened issue #${created.number}`);
            }

      - name: No drift — close stale watch issues
        if: steps.drift.outputs.behind == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-watch',
              state: 'open',
              per_page: 5,
            });
            for (const issue of existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Upstream synced — closing automatically.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.notice(`Closed issue #${issue.number}`);
            }
