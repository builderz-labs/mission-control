# RoceOS LiteLLM Proxy Configuration
# All inference routes through Anthropic Claude API
# Future: Add OpenAI, Gemini, or local LLM providers here

model_list:
  # Reasoning tier — complex decisions (trading, legal, multi-team synthesis)
  - model_name: "reasoning"
    litellm_params:
      model: "anthropic/claude-opus-4-6"
      max_tokens: 8192

  # Analysis tier — summaries, research, code, financial analysis
  - model_name: "analysis"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      max_tokens: 8192

  # Fast tier — classification, routing, monitoring, simple tasks
  - model_name: "fast"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      max_tokens: 4096

  # Direct model access (when skillsets need a specific model)
  - model_name: "claude-opus-4-6"
    litellm_params:
      model: "anthropic/claude-opus-4-6"

  - model_name: "claude-sonnet-4-6"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"

  - model_name: "claude-haiku-4-5"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"

litellm_settings:
  # Request timeout
  request_timeout: 120

  # Logging
  set_verbose: false

general_settings:
  # Master key for admin access to LiteLLM dashboard
  master_key: "${LITELLM_MASTER_KEY}"

  # Note: Spend tracking DB requires PostgreSQL. Skipping for Phase 0.
  # Add database_url when Postgres is added to the stack.
  # database_url: "postgresql://user:pass@postgres:5432/litellm"
