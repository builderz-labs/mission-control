  - id: infra
    name: Infrastructure
    description: VPS, deployment, observability
    phases:
      - id: api_max_migration
        name: API → Max subscription migration
        status: done
        system: roceos
        deliverables:
          - All LLM calls route through claude -p ($0)
          - Auto-failover claude-cli → anthropic-api → openai-api
          - OAuth credential auto-sync from WSL every 30 min
          - OpenClaw deprecated, API key removed
      - id: system_self_heal
        name: System health + self-heal script
        status: done
        notes: Replaces routine-based health checks (which ran in wrong sandbox and leaked XML tool calls). Routine becomes a thin formatter that reads /api/health/detailed.
        deliverables:
          - /opt/scripts/system_health.sh — checks docker, services, endpoints, scanners, resources, LLM auth; auto-restarts what it can
          - Hourly cron writes /var/lib/system-health/status.json
          - /api/health/detailed FastAPI endpoint exposes the JSON
          - Action items only surface when self-heal failed
          - Weekend-aware scanner check (futures markets closed Sat/Sun)
      - id: roceos_routine_repoint
        name: Repoint Roce-OS briefing at /api/health/detailed
        status: done
        system: roceos
        shipped_in_version: 3.6.1
        notes: Discovered the broken routines were NOT claude.ai /schedule routines (those came back empty) but the RoceOS engine's morning_briefing job in /docker/roce-os/engine/scheduler/briefing.py. Fixed by replacing the it_ops LLM source with a direct httpx GET to /api/health/detailed, and adding belt-and-suspenders XML stripping for any tool-use markup that leaks from other LLM sources. The compose volume mount for ./engine/scheduler had to be reattached via docker compose up — the running container had been started before the mount existed.
        deliverables:
          - briefing.py uses _collect_system_health (httpx → /api/health/detailed) instead of it_ops LLM
          - _strip_tool_use_markup applied to all collected sources + final output
          - Synthesis prompt now explicitly forbids function_calls/invoke/parameter tags
          - Engine container recreated with proper scheduler bind-mount
      - id: roceos_xml_spam_kill
        name: Eliminate RoceOS scheduled-job XML spam
        status: done
        system: roceos
        shipped_in_version: 3.6.3
        notes: Three jobs (it_ops_health_check, signal_quality_monitor, calendar_watch) called the LLM with tools that didn't actually execute reliably in the engine container, leaking <function_calls>/<invoke> markup as text. Replaced first two with direct httpx/sqlite. Disabled calendar_watch silently until proper Google API rewire (see roceos_calendar_rewire). Also dropped pulse references from /api/health, it_ops skillset prompt, and Captain Hook /health command.
        deliverables:
          - it_ops_health_check now reads /api/health/detailed (no LLM)
          - signal_quality_monitor now does direct sqlite query (no LLM)
          - calendar_watch silently disabled (was leaking XML every 30 min)
          - pulse references stripped from /api/health, it_ops skillset, bot.py /health
      - id: roceos_vision_and_obsidian
        name: RoceOS — Telegram photo vision + Obsidian wiki access
        status: done
        system: roceos
        shipped_in_version: 3.7.0
        notes: Two complaints fixed in one pass — Roce-OS couldn't see the plant wiki, and didn't process photos sent via Telegram. Vision uses Anthropic API key (paid, ~$0.001 per photo) because Anthropic confirmed OAT auth isn't supported for /v1/messages with images. Plant wiki at /app/obsidian/Plants/ was already bind-mounted; household skillset just didn't know to look there. Smoke test inventoried 30+ plants by status from real Obsidian frontmatter.
        deliverables:
          - core/telegram.py — handle_photo handler, _analyze_photo_bytes vision helper with OAT->APIkey auth fallback
          - household skillset prompt — explicit knowledge of /app/obsidian/Plants/ schema and how to use Glob/Read/Grep
          - household tools upgraded from Read,WebFetch to Read,WebFetch,Grep,Glob
          - docker-compose.roceos.yml — added bind mounts for engine/core, engine/skillsets, engine/cli_engine.py so future edits are live without rebuild
      - id: roceos_calendar_rewire
        name: Rewire calendar_watch + briefing calendar source via Google API
        status: planned
        system: roceos
        notes: google-api-python-client isn't installed in engine container. Need to add to engine/requirements.txt, rebuild image, then rewrite calendar_watch.py to use Credentials.from_authorized_user_file('/app/data/google_token.json') directly. The token file is already bind-mounted. Same for briefing.py's calendar source.
        deliverables:
          - Add google-api-python-client + google-auth-oauthlib to engine/requirements.txt
          - Rebuild + restart roceos-engine
          - Rewrite scheduler/calendar_watch.py to use Calendar API directly
          - Re-enable the job in jobs.py
          - Replace briefing.py's LLM calendar source with same direct API call
      - id: claude_oat_resilience
        name: Claude OAuth long-lived token + monitoring
        status: done
        system: roceos
        notes: Replaced WSL→VPS .credentials.json sync (which mirrored expired creds) with long-lived OAT via CLAUDE_CODE_OAUTH_TOKEN env var. Critical fix — discovered we'd been silently failing over to paid API key for unknown duration.
        deliverables:
          - claude setup-token OAT wired via CLAUDE_CODE_OAUTH_TOKEN in /opt/ict-discord-bot/.env
          - ANTHROPIC_API_KEY removed from bot env (was hijacking claude -p auth)
          - /opt/scripts/llm_auth_check.sh — every 30 min checks llm-config.json, alerts Telegram if non-OAuth path used 2h+
          - Rotation procedure documented in memory (claude_oat_setup.md)
      - id: cron_migration
        name: OpenClaw cron → system cron
        status: done
        system: roceos
        deliverables:
          - All 13 OpenClaw jobs moved to /opt/trading-cron.sh
          - Cost reduced ~$400/mo → $0
          - Morning briefing on Claude Code /schedule
      - id: monorepo_pull_in
        name: Pull dashboard frontend into monorepo
        status: done
        shipped_in_version: 3.6.0
        notes: Cutover 2026-04-25. /opt/ict-dashboard-full kept as rollback target. Required pinning Turbopack root in next.config.ts to stop it from picking up the parent monorepo's pnpm-lock.yaml.
        deliverables:
          - Move /opt/ict-dashboard-full → dashboard/web/
          - Remove VPS-only patch surface
          - .env.production checked into repo (NEXT_PUBLIC_* only)
          - Single deploy script
      - id: ci_version_bump
        name: CI version-bump check
        status: in_progress
        notes: Workflow file ready at .github/workflows/version-bump-check.yml. Awaiting push from a token with `workflow` scope (Ross's desktop). After push, mark done.
        deliverables:
          - GitHub Action that fails any PR touching scanner/bot/dashboard runtime without bumping /VERSION

  - id: user_agents
    name: User Execution Agents
    description: Multi-user signal subscription and local broker execution — onboard Greg, Gameplan, and paying users
    design_doc: docs/AGENT-ROLLOUT-V1.md
    phases:
      - id: entitlements_foundation
        name: Entitlements foundation — server-side user caps
        status: planned
        eta: 2026-04-30
        deliverables:
          - "entitlements table in dashboard.db: tier, max_contracts, max_per_day, allowed_symbols, allowed_timeframes, live_enabled, expires_at"
          - "audit_log table: every entitlement change, login, trade, halt action — required for trade disputes"
          - "users table extended: display_name, email, status (active|suspended|revoked)"
          - "agent_risk_audit table: agent reports its configured risk on every connect for server-side verification"
          - Server pushes entitlement JSON to agent on every WebSocket connect
          - Agent enforces min(local_risk, server_entitlement) — server ceiling can never be bypassed
          - Server re-validates reported trade qty against entitlement before logging
          - subscription-aware broadcast — connection_manager filters signals by allowed_symbols + allowed_timeframes + min_confidence per user
        notes: Build this first even if all rows are identical for beta users. This is the billing lever — tiers plug in here without a schema migration.

      - id: agent_v1_security
        name: Agent v1 — security and reliability hardening
        status: planned
        eta: 2026-04-30
        deliverables:
          - Remove plaintext credential fallback — keyring mandatory, hard-fail if unavailable (Windows DPAPI always present)
          - Move JWT from config.json into keyring — config file safe to email to support
          - Default live=demo — agent runs Tradovate demo for first 7 days; live_enabled flipped by Ross per user via dashboard
          - getpass.getpass() for password and sec fields in setup wizard (was echoing to terminal)
          - Signal dedup — persist last 100 executed signal_ids to state.json; drop duplicates on restart
          - Order fill polling — background loop queries Tradovate /order/list + /position/list every 30s; detects fills and reports trade_result to server
          - On-connect reconciliation — query Tradovate open positions, compare to local state.json, warn on mismatch
          - Graceful exit on WS close codes 4001/4003 (revoked token) — don't reconnect, print clear error
          - Pause flag — respect ~/.ict-agent/PAUSED file; agent holds on signal processing without killing process
          - Persistent in-memory risk state — reload open_trades from state.json on start instead of blank slate
        notes: Items 1, 3, 5, 6 are blockers before any external user connects. Items 2, 4, 7-10 are high-priority hardening.

      - id: dashboard_user_management
        name: Dashboard — user management + agent visibility
        status: planned
        eta: 2026-05-05
        deliverables:
          - "/users page (admin): list all users, status badges (ONLINE/OFFLINE/SUSPENDED), last-seen, install hostname"
          - "/users/[id] page (admin): trade history, current risk config, entitlement tier, Revoke + Regenerate Token buttons"
          - "Invite flow: admin enters display name + email → system creates user row, generates pairing token, shows one-time token to copy"
          - "POST /api/users, POST /api/users/{id}/pair, DELETE /api/users/{id} API endpoints"
          - "GET /api/users/{id}/trades endpoint (admin or self)"
          - "/me page (agent role): user sees own trades, P&L, agent connection status, current entitlement"
          - "agent role added to auth system — distinct from admin and viewer"
          - "Pairing token doubles as dashboard welcome token — /welcome?token=X lets user set their dashboard password"
          - Refactor manage.py add-user to call /api/users internally (CLI keeps working, UI becomes primary)
          - "agent_metrics table: tracks connects/disconnects, trades attempted, errors per user — drives ONLINE badge"
        notes: Ross currently has to SSH + run manage.py to issue tokens. This eliminates that entirely.

      - id: agent_installer_v1
        name: Agent installer — PyInstaller + Inno Setup (unsigned beta)
        status: planned
        eta: 2026-05-07
        deliverables:
          - PyInstaller spec file — single-file ICT-Agent.exe (console mode for beta)
          - "Inno Setup script — ict-agent-setup.exe: installs to %LOCALAPPDATA%\\ICTAgent, creates Windows service via nssm, Start Menu shortcut, uninstaller"
          - "ICT-Agent.bat launch script + ICT-Agent.command for macOS (future)"
          - "requirements-agent.txt with pinned deps: httpx>=0.25, websockets>=12, keyring>=24"
          - "agent/README.md: 2-page quickstart — Tradovate API Add-On setup steps, install steps, pairing steps, FAQ"
          - "GET /agent/latest endpoint on API — returns {version, url, sha256} for update checks"
          - GitHub release pipeline — push tag → build .exe → upload to release assets
        notes: No code signing for beta (users accept SmartScreen warning). Code signing cert required before charging money — OV cert ~$200/yr from SSL.com.

      - id: agent_v1_5_production
        name: Agent v1.5 — production hardening (closed beta, first live users)
        status: planned
        eta: 2026-05-21
        deliverables:
          - OV code signing cert — signed installer, no SmartScreen warning
          - Auto-updater — agent checks /agent/latest every 6h, downloads + prompts user to install
          - TOTP 2FA for admin dashboard login (pyotp + QR code setup)
          - "Server broadcast message types: global_halt (pushes to all agents), user_halt (single user), entitlement_update (push new tier without reconnect)"
          - Per-user halt column — users.halted; server refuses to broadcast to halted users; useful for 2am "stop my account" emails
          - slowapi rate limiting — max 10 connection attempts/min/IP, max 5 pair attempts/hour/IP
          - "/leaderboard page — anonymized weekly P&L + win rate, opt-in display name. Critical for retention."
          - Live execution gate — Ross reviews 7-day demo performance per user in dashboard, one-click flips live_enabled=1
          - Log rotation in agent — cap agent.log at 10MB, keep 3 rotations
          - "Terms of Use — signal provider disclaimer, no investment advice, kill switch authority, loss liability. Legal team draft + attorney review."
        notes: Do not take any user's money before TOS is reviewed by an attorney and code signing is in place.

      - id: agent_v2_subscriptions
        name: Agent v2 — subscription layer
        status: planned
        eta: 2026-06-16
        deliverables:
          - Stripe Checkout integration — product tiers map to entitlement rows
          - "POST /api/billing/webhook — Stripe webhook: payment success → activate entitlement, cancellation → suspend"
          - Self-service signup — landing page → Stripe Checkout → pairing token emailed automatically
          - Trial period — 7-day demo forced, then subscription required to continue receiving signals
          - "/billing page for users — subscription status, next renewal, cancel button"
          - Refund/cancellation flow — revoke agent + suspend user on chargeback
          - Tier definitions enforced end-to-end (Beta / Standard $99/mo / Pro $299/mo)
        notes: Defer until 5+ paying users actively want it. Manual invoicing is fine for first cohort.

