# Killzone Roadmap — single source of truth for capability tracks and phases.
# Edit this file, commit, and the dashboard /roadmap page reflects it on next load.
#
# Schema:
#   tracks:
#     - id:           short slug (used in URL fragments)
#       name:         display name
#       description:  one-liner
#       design_doc:   optional path to the doc that has full context
#       phases:
#         - id:                 short slug
#           name:               display name
#           status:             planned | in_progress | done | blocked | deferred
#           eta:                optional ISO date for planned/in_progress
#           shipped_in_version: optional semver if status=done
#           commits:            optional list of short SHAs
#           pr:                 optional PR URL
#           deliverables:       list of strings
#           notes:              optional caveats / blockers

tracks:
  - id: killzone
    name: Killzone Dashboard
    description: Web operations console for the ICT trading system
    design_doc: docs/DASHBOARD-V1.md
    phases:
      - id: p0
        name: P0 — Foundation
        status: done
        shipped_in_version: 3.6.0
        commits: [ad34247, 276f6ab, 6cb93cb]
        deliverables:
          - Killzone branding (title, header, footer, nav)
          - /VERSION single source of truth + bump-version.sh script
          - /api/version endpoint + footer VersionBadge
          - /proposals page with approve/reject/revise buttons
          - Idempotent SQL migration runner
          - Captain Hook auto-runs Claude assessment on /propose
      - id: equity_curve_split
        name: Split equity curve by symbol — Proposal #6
        status: done
        shipped_in_version: 3.7.1
        commits: [3506957, 9725dff]
        deliverables:
          - /api/equity returns three curves (combined dollars, ES-only points, NQ-only points) + per-symbol totals
          - Overview page tab switcher ($ Combined / ES pts / NQ pts)
          - Total P&L KPI card shows ES/NQ point breakdown in subtitle
        notes: Dollar conversion uses micro contract point values (ES $5/pt, NQ $2/pt)
      - id: trade_ids_and_timezone
        name: Trade IDs + UTC→ET timezone fix — Proposal #8
        status: done
        shipped_in_version: 3.7.1
        deliverables:
          - Trade ID column in /trades page
          - All dashboard timestamps in ET (America/New_York) with formatET() helper
          - Scanner page timestamps in ET
      - id: p1
        name: P1 — Auth + role-based views
        status: planned
        eta: 2026-05-05
        deliverables:
          - Replace X-Admin-Token header with real session login (scrypt + cookie)
          - Role-based roadmap views — authenticated admin (Ross) sees all tracks including RoceOS; unauthenticated/community users see Killzone and trading tracks only
          - /decide endpoint posts outcome back to Discord #ict-bot-alerts
          - user_settings table + baseline seed
          - Tag historical paper_trades with user_id
      - id: p2
        name: P2 — User settings sliders
        status: planned
        eta: 2026-05-19
        deliverables:
          - /settings page with sliders for position size, min confidence, instruments, kill zones, R-multiples
          - Simulated paper trades branched per user from same signal stream
          - What-if recompute on slider change
      - id: p3
        name: P3 — Multi-user views
        status: planned
        eta: 2026-06-02
        deliverables:
          - PnL leaderboard (Ross / Greg / Ryan / Baseline)
          - Killer chart — all users' equity curves on one canvas with baseline reference
          - Per-user trade history with auth
          - Live trade ingest from execution agent fills
      - id: p4
        name: P4 — Onboarding
        status: planned
        eta: 2026-06-23
        deliverables:
          - Pairing token UI
          - Broker connect wizard (Tradovate creds → user OS keyring)
          - Settings tour
          - Go-live gate (must be paper-positive 30 days)
      - id: p5
        name: P5 — Subscription/billing
        status: deferred
        notes: Defer until 5+ users actively want it
        deliverables:
          - Stripe billing layer
          - Tiered access plans

  - id: trading
    name: Trading System
    description: ICT scanner, paper baseline, live execution
    design_doc: trading/README.md
    phases:
      - id: scanner_v3
        name: Scanner v3.6 baseline
        status: done
        shipped_in_version: 3.6.0
        deliverables:
          - 5-condition ICT chain (sweep, MSS, FVG, proximity, kill zone)
          - Hard gates (HTF bias, position cap, daily loss halt)
          - Reference levels in alerts (PDH/PDL, CBDR, ORG, VIB, BPR, REH/REL, NWOG, macro times)
          - TradingView webhook + cron backup
          - Paper trade auto-log at 4/5+
      - id: tradovate_live
        name: Tradovate live execution (Ross only)
        status: in_progress
        eta: 2026-04-28
        deliverables:
          - Funded account ($1,000)
          - Tradovate API credentials
          - Bracket order client (market entry + stop + target OSO)
          - Front-month contract resolver (ES → MESM6, NQ → MNQM6)
          - First live trade
        notes: Account funding ETA Monday
      - id: pda_gate
        name: PDA levels as hard gate (Proposal #9)
        status: done
        shipped_in_version: 3.7.1
        commits: [0f4e1f1]
        deliverables:
          - PDA level computation in scanner (reuses HTF bsl/ssl — no extra fetch)
          - Discount/premium gate per direction (LONG blocked in premium, SHORT blocked in discount)
          - 0.1% dead band around equilibrium to avoid whipsaws
          - PDA zone + equilibrium shown in every Discord alert under Key Levels
        notes: Backtest validation pending — running on paper until validated
      - id: daily_tf_multi_bar
        name: Daily TF multi-bar structure (Proposal #5)
        status: done
        shipped_in_version: 3.7.2
        deliverables:
          - detect_mss() accepts timeframe parameter
          - Daily TF uses 5-candle swing fractals (n=2) vs 3-candle for 15m/1h
          - ICT multi-bar structure confirmation for daily bias signals
          - fractal_label shown in MSS detail string per timeframe
      - id: smt_divergence
        name: SMT divergence (Proposal #10) — phased
        status: planned
        notes: MODIFY recommendation — ship Phase A first (data only), gate Phases B-D on backtest
        deliverables:
          - "Phase A: Add YM=F to INSTRUMENTS dict + data feed"
          - "Phase B: Detect ES/NQ/YM divergence, log alert-only"
          - "Phase C: 30-day backtest of bias-override hypothesis"
          - "Phase D: Ship bias-override only if Phase C is positive"
      - id: agent_packaging
        name: Execution agent — PyInstaller bundle
        status: planned
        deliverables:
          - Single-file ICT-Agent.exe via PyInstaller
          - Setup wizard (pairing token + broker creds → OS keyring)
          - Auto-update channel
      - id: ws_signal_broadcast
        name: Signal broadcast (Architecture A)
        status: done
        deliverables:
          - WebSocket endpoint wss://api.ictwealthbuilding.com/ws/signals
          - JWT auth + one-time pairing tokens
          - Per-user execution agent (broker creds stay local)

  - id: captain_hook
    name: Captain Hook (Discord bot)
    description: Member interface to the trading system on Discord
    phases:
      - id: bot_v3
        name: Captain Hook v3.6 baseline
        status: done
        shipped_in_version: 3.6.0
        deliverables:
          - 7 slash commands (/ask, /stats, /signal, /propose, /research, /glossary, /health)
          - Mention-only trigger (no keywords or auto-image triggers)
          - Image analysis on attachments
          - YouTube transcript extraction
          - Auto-assessment of /propose via Claude
      - id: discord_echoback
        name: Decision echo-back to Discord
        status: done
        shipped_in_version: 3.6.0
        notes: Bot polls bot.db every 30s for decided-but-not-echoed proposals, posts to #ict-bot-alerts tagging the submitter, marks echoed_at + message_id. Historical decisions backfilled as silent.
        deliverables:
          - When Ross approves/rejects on dashboard, bot posts the outcome to #ict-bot-alerts tagging the submitter
      - id: attribution_cleanup
        name: Remove Gameplan-007 attribution from user-facing output
        status: done
        shipped_in_version: 3.7.3
        deliverables:
          - Dashboard meta description and footer
          - Discord alert footers in both scanners
          - Bot system prompts
      - id: live_perf_stats
        name: Live performance stats in system prompt
        status: done
        shipped_in_version: 3.7.4
        deliverables:
          - _fetch_perf_stats() queries trading DB at startup
          - Stats cache refreshes every hour automatically
          - No more stale hardcoded win-rate and P&L strings

  - id: infra
    name: Infrastructure
    description: VPS, deployment, observability
    phases:
      - id: api_max_migration
        name: API → Max subscription migration
        status: done
        system: roceos
        deliverables:
          - All LLM calls route through claude -p ($0)
          - Auto-failover claude-cli → anthropic-api → openai-api
          - OAuth credential auto-sync from WSL every 30 min
          - OpenClaw deprecated, API key removed
      - id: system_self_heal
        name: System health + self-heal script
        status: done
        notes: Replaces routine-based health checks (which ran in wrong sandbox and leaked XML tool calls). Routine becomes a thin formatter that reads /api/health/detailed.
        deliverables:
          - /opt/scripts/system_health.sh — checks docker, services, endpoints, scanners, resources, LLM auth; auto-restarts what it can
          - Hourly cron writes /var/lib/system-health/status.json
          - /api/health/detailed FastAPI endpoint exposes the JSON
          - Action items only surface when self-heal failed
          - Weekend-aware scanner check (futures markets closed Sat/Sun)
      - id: roceos_routine_repoint
        name: Repoint Roce-OS briefing at /api/health/detailed
        status: done
        system: roceos
        shipped_in_version: 3.6.1
        notes: Discovered the broken routines were NOT claude.ai /schedule routines (those came back empty) but the RoceOS engine's morning_briefing job in /docker/roce-os/engine/scheduler/briefing.py. Fixed by replacing the it_ops LLM source with a direct httpx GET to /api/health/detailed, and adding belt-and-suspenders XML stripping for any tool-use markup that leaks from other LLM sources. The compose volume mount for ./engine/scheduler had to be reattached via docker compose up — the running container had been started before the mount existed.
        deliverables:
          - briefing.py uses _collect_system_health (httpx → /api/health/detailed) instead of it_ops LLM
          - _strip_tool_use_markup applied to all collected sources + final output
          - Synthesis prompt now explicitly forbids function_calls/invoke/parameter tags
          - Engine container recreated with proper scheduler bind-mount
      - id: roceos_xml_spam_kill
        name: Eliminate RoceOS scheduled-job XML spam
        status: done
        system: roceos
        shipped_in_version: 3.6.3
        notes: Three jobs (it_ops_health_check, signal_quality_monitor, calendar_watch) called the LLM with tools that didn't actually execute reliably in the engine container, leaking <function_calls>/<invoke> markup as text. Replaced first two with direct httpx/sqlite. Disabled calendar_watch silently until proper Google API rewire (see roceos_calendar_rewire). Also dropped pulse references from /api/health, it_ops skillset prompt, and Captain Hook /health command.
        deliverables:
          - it_ops_health_check now reads /api/health/detailed (no LLM)
          - signal_quality_monitor now does direct sqlite query (no LLM)
          - calendar_watch silently disabled (was leaking XML every 30 min)
          - pulse references stripped from /api/health, it_ops skillset, bot.py /health
      - id: roceos_vision_and_obsidian
        name: RoceOS — Telegram photo vision + Obsidian wiki access
        status: done
        system: roceos
        shipped_in_version: 3.7.0
        notes: Two complaints fixed in one pass — Roce-OS couldn't see the plant wiki, and didn't process photos sent via Telegram. Vision uses Anthropic API key (paid, ~$0.001 per photo) because Anthropic confirmed OAT auth isn't supported for /v1/messages with images. Plant wiki at /app/obsidian/Plants/ was already bind-mounted; household skillset just didn't know to look there. Smoke test inventoried 30+ plants by status from real Obsidian frontmatter.
        deliverables:
          - core/telegram.py — handle_photo handler, _analyze_photo_bytes vision helper with OAT->APIkey auth fallback
          - household skillset prompt — explicit knowledge of /app/obsidian/Plants/ schema and how to use Glob/Read/Grep
          - household tools upgraded from Read,WebFetch to Read,WebFetch,Grep,Glob
          - docker-compose.roceos.yml — added bind mounts for engine/core, engine/skillsets, engine/cli_engine.py so future edits are live without rebuild
      - id: roceos_calendar_rewire
        name: Rewire calendar_watch + briefing calendar source via Google API
        status: planned
        system: roceos
        notes: google-api-python-client isn't installed in engine container. Need to add to engine/requirements.txt, rebuild image, then rewrite calendar_watch.py to use Credentials.from_authorized_user_file('/app/data/google_token.json') directly. The token file is already bind-mounted. Same for briefing.py's calendar source.
        deliverables:
          - Add google-api-python-client + google-auth-oauthlib to engine/requirements.txt
          - Rebuild + restart roceos-engine
          - Rewrite scheduler/calendar_watch.py to use Calendar API directly
          - Re-enable the job in jobs.py
          - Replace briefing.py's LLM calendar source with same direct API call
      - id: claude_oat_resilience
        name: Claude OAuth long-lived token + monitoring
        status: done
        system: roceos
        notes: Replaced WSL→VPS .credentials.json sync (which mirrored expired creds) with long-lived OAT via CLAUDE_CODE_OAUTH_TOKEN env var. Critical fix — discovered we'd been silently failing over to paid API key for unknown duration.
        deliverables:
          - claude setup-token OAT wired via CLAUDE_CODE_OAUTH_TOKEN in /opt/ict-discord-bot/.env
          - ANTHROPIC_API_KEY removed from bot env (was hijacking claude -p auth)
          - /opt/scripts/llm_auth_check.sh — every 30 min checks llm-config.json, alerts Telegram if non-OAuth path used 2h+
          - Rotation procedure documented in memory (claude_oat_setup.md)
      - id: cron_migration
        name: OpenClaw cron → system cron
        status: done
        system: roceos
        deliverables:
          - All 13 OpenClaw jobs moved to /opt/trading-cron.sh
          - Cost reduced ~$400/mo → $0
          - Morning briefing on Claude Code /schedule
      - id: monorepo_pull_in
        name: Pull dashboard frontend into monorepo
        status: done
        shipped_in_version: 3.6.0
        notes: Cutover 2026-04-25. /opt/ict-dashboard-full kept as rollback target. Required pinning Turbopack root in next.config.ts to stop it from picking up the parent monorepo's pnpm-lock.yaml.
        deliverables:
          - Move /opt/ict-dashboard-full → dashboard/web/
          - Remove VPS-only patch surface
          - .env.production checked into repo (NEXT_PUBLIC_* only)
          - Single deploy script
      - id: ci_version_bump
        name: CI version-bump check
        status: in_progress
        notes: Workflow file ready at .github/workflows/version-bump-check.yml. Awaiting push from a token with `workflow` scope (Ross's desktop). After push, mark done.
        deliverables:
          - GitHub Action that fails any PR touching scanner/bot/dashboard runtime without bumping /VERSION
