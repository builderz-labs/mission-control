# Killzone Roadmap — single source of truth for capability tracks and phases.
# Edit this file, commit, and the dashboard /roadmap page reflects it on next load.
#
# Schema:
#   tracks:
#     - id:           short slug (used in URL fragments)
#       name:         display name
#       description:  one-liner
#       design_doc:   optional path to the doc that has full context
#       phases:
#         - id:                 short slug
#           name:               display name
#           status:             planned | in_progress | done | blocked | deferred
#           eta:                optional ISO date for planned/in_progress
#           shipped_in_version: optional semver if status=done
#           commits:            optional list of short SHAs
#           pr:                 optional PR URL
#           deliverables:       list of strings
#           notes:              optional caveats / blockers

tracks:
  - id: killzone
    name: Killzone Dashboard
    description: Web operations console for the ICT trading system
    design_doc: docs/DASHBOARD-V1.md
    phases:
      - id: p0
        name: P0 — Foundation
        status: done
        shipped_in_version: 3.6.0
        commits: [ad34247, 276f6ab, 6cb93cb]
        deliverables:
          - Killzone branding (title, header, footer, nav)
          - /VERSION single source of truth + bump-version.sh script
          - /api/version endpoint + footer VersionBadge
          - /proposals page with approve/reject/revise buttons
          - Idempotent SQL migration runner
          - Captain Hook auto-runs Claude assessment on /propose
      - id: equity_curve_split
        name: Split equity curve by symbol — Proposal #6
        status: done
        shipped_in_version: 3.7.1
        commits: [3506957, 9725dff]
        deliverables:
          - /api/equity returns three curves (combined dollars, ES-only points, NQ-only points) + per-symbol totals
          - Overview page tab switcher ($ Combined / ES pts / NQ pts)
          - Total P&L KPI card shows ES/NQ point breakdown in subtitle
        notes: Dollar conversion uses micro contract point values (ES $5/pt, NQ $2/pt)
      - id: trade_ids_and_timezone
        name: Trade IDs + UTC→ET timezone fix — Proposal #8
        status: done
        shipped_in_version: 3.7.1
        deliverables:
          - Trade ID column in /trades page
          - All dashboard timestamps in ET (America/New_York) with formatET() helper
          - Scanner page timestamps in ET
      - id: p1
        name: P1 — Auth + role-based views
        status: done
        shipped_in_version: 3.8.0
        deliverables:
          - Replace X-Admin-Token header with real session login (scrypt + cookie)
          - Role-based roadmap views — authenticated admin (Ross) sees all tracks including RoceOS; unauthenticated/community users see Killzone and trading tracks only
          - /decide endpoint posts outcome back to Discord #ict-bot-alerts
          - user_settings table + baseline seed
          - Tag historical paper_trades with user_id
        notes: Historical paper_trades tagging stub exists in seed_admin() but UPDATE statement was not written — all future trades are tagged correctly; historical backfill is a minor cleanup item

      - id: discord_oauth
        name: P1.5 — Discord OAuth login
        status: done
        shipped_in_version: 3.13.0
        deliverables:
          - Sign in with Discord button on login page — primary auth method
          - Discord OAuth2 callback — exchanges code, upserts user row, creates session cookie
          - Users table extended with discord_id (UNIQUE), discord_username, discord_avatar, auth_method columns
          - DISCORD_ADMIN_IDS env var maps Discord user IDs to admin role
          - DISCORD_GUILD_ID env var optionally restricts access to server members
          - NavAuth shows Discord avatar + display name for OAuth users
          - Password login preserved as fallback for admin (Ross)
        notes: Requires DISCORD_CLIENT_ID + DISCORD_CLIENT_SECRET + DISCORD_ADMIN_IDS added to VPS .env before use
      - id: paper_live_separation
        name: Paper vs live account separation
        status: planned
        eta: 2026-04-28
        deliverables:
          - "Trades page: Paper / Live / All tabs (mode filter)"
          - "Equity curve: separate curves for paper baseline vs live account"
          - "Overview KPIs split by mode — paper win rate and live P&L never mixed"
          - "/api/trades and /api/equity accept mode= query param"
          - "Live account view: real-time P&L and open positions direct from Tradovate"
        notes: mode column already exists in paper_trades (paper|live). Dashboard currently shows everything mixed.

      - id: p2
        name: P2 — User settings sliders
        status: planned
        eta: 2026-05-19
        deliverables:
          - /settings page with sliders for position size, min confidence, instruments, kill zones, R-multiples
          - Simulated paper trades branched per user from same signal stream
          - What-if recompute on slider change
      - id: p3
        name: P3 — Multi-user views
        status: planned
        eta: 2026-06-02
        deliverables:
          - PnL leaderboard (Ross / Greg / Ryan / Baseline)
          - Killer chart — all users' equity curves on one canvas with baseline reference
          - Per-user trade history with auth
          - Live trade ingest from execution agent fills
      - id: p4
        name: P4 — Onboarding
        status: planned
        eta: 2026-06-23
        deliverables:
          - Pairing token UI
          - Broker connect wizard (Tradovate creds → user OS keyring)
          - Settings tour
          - Go-live gate (must be paper-positive 30 days)
      - id: p5
        name: P5 — Subscription/billing
        status: deferred
        notes: Defer until 5+ users actively want it
        deliverables:
          - Stripe billing layer
          - Tiered access plans

  - id: trading
    name: Trading System
    description: ICT scanner, paper baseline, live execution
    design_doc: trading/README.md
    phases:
      - id: scanner_v3
        name: Scanner v3.6 baseline
        status: done
        shipped_in_version: 3.6.0
        deliverables:
          - 5-condition ICT chain (sweep, MSS, FVG, proximity, kill zone)
          - Hard gates (HTF bias, position cap, daily loss halt)
          - Reference levels in alerts (PDH/PDL, CBDR, ORG, VIB, BPR, REH/REL, NWOG, macro times)
          - TradingView webhook + cron backup
          - Paper trade auto-log at 4/5+
      - id: tradovate_live
        name: Tradovate live execution (Ross only)
        status: in_progress
        eta: 2026-04-28
        deliverables:
          - Funded account ($1,000)
          - Tradovate API credentials
          - Bracket order client (market entry + stop + target OSO)
          - Front-month contract resolver (ES → MESM6, NQ → MNQM6)
          - First live trade
        notes: Account funding ETA Monday
      - id: pda_gate
        name: PDA levels as hard gate (Proposal #9)
        status: done
        shipped_in_version: 3.7.1
        commits: [0f4e1f1]
        deliverables:
          - PDA level computation in scanner (reuses HTF bsl/ssl — no extra fetch)
          - Discount/premium gate per direction (LONG blocked in premium, SHORT blocked in discount)
          - 0.1% dead band around equilibrium to avoid whipsaws
          - PDA zone + equilibrium shown in every Discord alert under Key Levels
        notes: Backtest validation pending — running on paper until validated
      - id: daily_tf_multi_bar
        name: Daily TF multi-bar structure (Proposal #5)
        status: done
        shipped_in_version: 3.7.2
        deliverables:
          - detect_mss() accepts timeframe parameter
          - Daily TF uses 5-candle swing fractals (n=2) vs 3-candle for 15m/1h
          - ICT multi-bar structure confirmation for daily bias signals
          - fractal_label shown in MSS detail string per timeframe
      - id: smt_divergence
        name: SMT divergence (Proposal #10) — phased
        status: in_progress
        deliverables:
          - "Phase A: YM=F observe_only in INSTRUMENTS + smt_divergence DB table (DONE v3.7.5)"
          - "Phase B: Detect ES/NQ/YM divergence, log alert-only"
          - "Phase C: 30-day backtest of bias-override hypothesis"
          - "Phase D: Ship bias-override only if Phase C is positive"
        notes: Phase A shipped. Phase B gates on 30 days of Phase A data.
      - id: live_readiness
        name: Live trading readiness — pre-launch gates
        status: in_progress
        deliverables:
          - "P0 ✅ DONE (v3.9.0): Telegram alert on every live order placement"
          - "P0 ✅ DONE (v3.9.0): Kill switch — /halt + /resume Discord commands + /api/execution/halt|resume dashboard endpoints"
          - "P0 ✅ DONE (v3.9.0): Duplicate signal guard — skip if same symbol/TF/direction fired within 5 minutes"
          - "P0 ✅ DONE (v3.9.0): API error Telegram alert — any live execution failure pages Ross immediately"
          - "P1 (within 48h of go-live): Balance pre-check before placing bracket order"
          - "P1 (within 48h of go-live): Dollar daily loss cap (configurable, default $100/day on $1k account)"
          - "P1 (within 48h of go-live): Startup reconciliation — query Tradovate positions on start, compare to DB"
        notes: "P0 blockers all shipped v3.9.0. P1 items activate within 48h of first live trade. Waiting on: Tradovate account funding ($1k) + API Add-On ($25/mo)."

      - id: agent_packaging
        name: Execution agent — PyInstaller bundle
        status: in_progress
        notes: Superseded by user_agents track which has the full phased rollout plan. See that track for all deliverables.
        deliverables:
          - See user_agents track for phased v1.0 / v1.5 / v2.0 plan
      - id: ws_signal_broadcast
        name: Signal broadcast (Architecture A)
        status: done
        deliverables:
